<!doctype html>
<html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Italiano interattivo</title><link rel="stylesheet" href="assets/style.css"></head>
<body><div class="wrap"><header class="hero"><h1>Italiano interattivo</h1><p>Sito di studio basato sugli appunti caricati. Ogni argomento ha una pagina autonoma e un quiz finale: le risposte sbagliate vengono evidenziate, ma non viene mostrata la risposta corretta.</p><div class="badges"><span class="badge">16 argomenti</span><span class="badge">288 domande</span><span class="badge">PDF: 72 pagine</span><span class="badge" data-progress-text>0/16 argomenti superati</span></div><div class="progressbar"><span data-progress-bar></span></div></header><main class="main-card" style="padding:26px"><input id="indexSearch" class="searchbox" placeholder="Cerca visivamente tra gli argomenti nella pagina"><div id="topicsGrid" class="grid"></div></main></div><script src="assets/data.js"></script><script src="assets/app.js"></script><script>document.addEventListener('input',e=>{if(e.target.id==='indexSearch'){const q=e.target.value.toLowerCase();document.querySelectorAll('.tile').forEach(t=>t.style.display=t.textContent.toLowerCase().includes(q)?'flex':'none')}})</script></body></html>
